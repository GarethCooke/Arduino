<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MorrayGlow — WiFi Setup</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .network-list { width: 100%; display: flex; flex-direction: column; gap: 0.4rem; }
        .net-item {
            padding: 0.7rem 1rem;
            border-radius: 8px;
            background: #0c0c1a;
            border: 1px solid transparent;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: border-color 0.2s;
        }
        .net-item:hover { border-color: #555; }
        .net-item.selected { border-color: var(--on-color); }
        .net-signal { font-size: 0.75rem; color: var(--muted); }
        .field { width: 100%; display: flex; flex-direction: column; gap: 0.3rem; }
        .field label { font-size: 0.8rem; color: var(--muted); }
        .field input {
            padding: 0.6rem 0.9rem;
            border-radius: 8px;
            border: 1px solid #333;
            background: #0c0c1a;
            color: var(--text);
            font-size: 0.9rem;
            width: 100%;
        }
        .field input:focus { outline: none; border-color: var(--on-color); }
        .btn-connect {
            width: 100%;
            padding: 0.75rem;
            border-radius: 8px;
            border: none;
            background: var(--on-color);
            color: #1a1a2e;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
        }
        .btn-connect:disabled { opacity: 0.4; cursor: not-allowed; }
        .device-url-card[hidden] { display: none; }
        .device-url-text { font-size: 0.9rem; color: var(--on-color); text-decoration: underline; }
        .device-url-text:hover { opacity: 0.8; }
        .card-header { width: 100%; display: flex; justify-content: space-between; align-items: center; }
        .btn-rescan { background: none; border: none; cursor: pointer; padding: 0; font-size: 1rem; }
    </style>
</head>
<body>
    <div class="container">
        <h1>MorrayGlow</h1>
        <p class="status">WiFi Setup</p>

        <div class="card">
            <div class="card-header">
                <p class="color-label">Available Networks</p>
                <button id="rescan" type="button" class="nav-link btn-rescan" aria-label="Rescan">&#8635;</button>
            </div>
            <div id="networks" class="network-list">
                <p class="status">Scanning&hellip;</p>
            </div>
        </div>

        <div class="card">
            <div class="field">
                <label for="ssid">Network (SSID)</label>
                <input id="ssid" type="text" placeholder="Select above or type manually"
                    autocomplete="off" autocorrect="off" autocapitalize="none" spellcheck="false">
            </div>
            <div class="field">
                <label for="pwd">Password</label>
                <input id="pwd" type="password" placeholder="Leave blank for open networks">
            </div>
            <button id="btn" class="btn-connect" disabled>Connect</button>
        </div>

        <p id="msg" class="status"></p>

        <div class="card device-url-card" id="device-url-card" hidden>
            <p class="color-label">After connecting, visit</p>
            <a id="device-url" class="status device-url-text" target="_blank" rel="noopener"></a>
        </div>
    </div>

    <script>
    (function () {
        'use strict';

        var ssidEl     = document.getElementById('ssid');
        var pwdEl      = document.getElementById('pwd');
        var btn        = document.getElementById('btn');
        var networksEl = document.getElementById('networks');
        var msgEl      = document.getElementById('msg');
        var urlCard    = document.getElementById('device-url-card');
        var urlEl      = document.getElementById('device-url');
        var rescanBtn  = document.getElementById('rescan');

        // Show the predicted device URL so the user knows where to go after setup.
        fetch('/api/deviceinfo')
            .then(function (r) { return r.json(); })
            .then(function (info) {
                urlEl.href        = info.url;
                urlEl.textContent = info.url;
                urlCard.hidden    = false;
            })
            .catch(function () { /* non-critical, hide silently */ });

        ssidEl.addEventListener('input', function () {
            btn.disabled = ssidEl.value.trim().length === 0;
        });

        function bars(rssi) {
            if (rssi >= -50) return '&#9602;&#9604;&#9606;&#9608;';
            if (rssi >= -60) return '&#9602;&#9604;&#9606;';
            if (rssi >= -70) return '&#9602;&#9604;';
            return '&#9602;';
        }

        function selectNetwork(ssid) {
            ssidEl.value = ssid;
            btn.disabled = false;
            networksEl.querySelectorAll('.net-item').forEach(function (el) {
                el.classList.toggle('selected', el.dataset.ssid === ssid);
            });
            pwdEl.focus();
        }

        function scanNetworks() {
            networksEl.innerHTML = '<p class="status">Scanning&hellip;</p>';
            rescanBtn.disabled = true;
            fetch('/api/networkdata')
                .then(function (r) { return r.json(); })
                .then(function (data) {
                    if (data.scanning) {
                        // Scan still running on device — retry after 1 s
                        setTimeout(scanNetworks, 1000);
                        return;
                    }
                    rescanBtn.disabled = false;
                    var nets = (data.networks || []).sort(function (a, b) { return b.rssi - a.rssi; });
                    if (nets.length === 0) {
                        networksEl.innerHTML = '<p class="status">No networks found</p>';
                        return;
                    }
                    networksEl.innerHTML = '';
                    nets.forEach(function (n) {
                        var el = document.createElement('div');
                        el.className = 'net-item';
                        el.dataset.ssid = n.ssid;
                        el.innerHTML = '<span>' + n.ssid + '</span>'
                            + '<span class="net-signal">' + bars(n.rssi)
                            + (n.secure ? ' &#128274;' : '') + '</span>';
                        el.addEventListener('click', function () { selectNetwork(n.ssid); });
                        networksEl.appendChild(el);
                    });
                })
                .catch(function () {
                    networksEl.innerHTML = '<p class="status">Scan failed</p>';
                    rescanBtn.disabled = false;
                });
        }

        rescanBtn.addEventListener('click', scanNetworks);
        scanNetworks();

        btn.addEventListener('click', function () {
            var ssid = ssidEl.value.trim();
            if (!ssid) return;
            btn.disabled = true;
            msgEl.textContent = 'Saving\u2026';
            fetch('/api/networkset', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ ssid: ssid, password: pwdEl.value })
            })
                .then(function (r) { return r.json(); })
                .then(function () {
                    msgEl.textContent = 'Saved \u2014 device restarting\u2026';
                })
                .catch(function () {
                    msgEl.textContent = 'Failed \u2014 please try again';
                    btn.disabled = false;
                });
        });
    }());
    </script>
</body>
</html>
