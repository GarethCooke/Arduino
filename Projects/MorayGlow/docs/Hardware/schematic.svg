<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 750" width="960" height="750"
     font-family="monospace" font-size="11">

  <!-- Background -->
  <rect width="960" height="750" fill="#1a1a2e"/>

  <!-- Title -->
  <text x="480" y="28" fill="#e0e0e0" font-size="16" text-anchor="middle" font-weight="bold">
    Seeed XIAO ESP32-S3 — RGB LED Strip Controller
  </text>
  <text x="480" y="46" fill="#888" font-size="10" text-anchor="middle">
    LEDC PWM · D0/GPIO1=R · D1/GPIO2=G · D2/GPIO3=B · D3/GPIO4=LED · D4/GPIO5=BTN · 12V in · 5V buck
  </text>

  <!-- ═══ POWER RAILS ═══ -->
  <line x1="30" y1="80"  x2="930" y2="80"  stroke="#ff4444" stroke-width="2"/>
  <line x1="30" y1="680" x2="930" y2="680" stroke="#444"    stroke-width="2"/>
  <text x="890" y="73"  fill="#ff4444" font-size="10" font-weight="bold">+12V</text>
  <text x="890" y="675" fill="#666"    font-size="10">GND</text>
  <text x="30"  y="73"  fill="#ff4444" font-size="10">+12V</text>
  <text x="30"  y="675" fill="#666"    font-size="10">GND</text>

  <!-- ═══ POWER JACK J1 ═══ -->
  <rect x="38" y="100" width="70" height="45" rx="4" fill="#1a1a1a" stroke="#888" stroke-width="1.5"/>
  <text x="73" y="118" fill="#888" text-anchor="middle" font-size="9" font-weight="bold">J1</text>
  <text x="73" y="131" fill="#666" text-anchor="middle" font-size="8">BARREL</text>
  <text x="73" y="141" fill="#666" text-anchor="middle" font-size="8">5.5/2.1</text>
  <line x1="38"  y1="110" x2="30"  y2="110" stroke="#ff4444" stroke-width="1.5"/>
  <line x1="30"  y1="110" x2="30"  y2="80"  stroke="#ff4444" stroke-width="1.5"/>
  <line x1="38"  y1="135" x2="30"  y2="135" stroke="#444"    stroke-width="1.5"/>
  <line x1="30"  y1="135" x2="30"  y2="680" stroke="#444"    stroke-width="1.5"/>

  <!-- ═══ BUCK CONVERTER PS1 ═══ -->
  <rect x="130" y="100" width="115" height="65" rx="5" fill="#1e3a5f" stroke="#4a90d9" stroke-width="1.5"/>
  <text x="187" y="122" fill="#4a90d9" text-anchor="middle" font-weight="bold" font-size="10">BUCK</text>
  <text x="187" y="136" fill="#4a90d9" text-anchor="middle" font-size="10">CONVERTER</text>
  <text x="187" y="152" fill="#aaa"    text-anchor="middle" font-size="9">12V → 5V</text>
  <text x="187" y="162" fill="#666"    text-anchor="middle" font-size="8">MP1584 rec.</text>
  <!-- 12V in -->
  <line x1="130" y1="118" x2="108" y2="118" stroke="#ff4444" stroke-width="1.5"/>
  <line x1="108" y1="118" x2="108" y2="80"  stroke="#ff4444" stroke-width="1.5"/>
  <!-- GND -->
  <line x1="130" y1="152" x2="108" y2="152" stroke="#444"    stroke-width="1.5"/>
  <line x1="108" y1="152" x2="108" y2="680" stroke="#444"    stroke-width="1.5"/>
  <!-- 5V out -->
  <line x1="245" y1="118" x2="280" y2="118" stroke="#ffaa00" stroke-width="1.5"/>
  <text x="250"  y="113" fill="#ffaa00" font-size="9">+5V</text>
  <line x1="245" y1="152" x2="280" y2="152" stroke="#444"    stroke-width="1.5"/>

  <!-- ═══ XIAO ESP32-S3 ═══ -->
  <rect x="280" y="95" width="145" height="270" rx="8" fill="#0d2137" stroke="#4a90d9" stroke-width="2"/>
  <!-- Board silkscreen detail -->
  <rect x="295" y="108" width="115" height="30" rx="3" fill="#0a1a2e" stroke="#1a3a5e"/>
  <text x="352" y="120" fill="#4a90d9" text-anchor="middle" font-weight="bold" font-size="11">XIAO</text>
  <text x="352" y="132" fill="#4a90d9" text-anchor="middle" font-size="9">ESP32-S3</text>
  <!-- USB-C indicator -->
  <rect x="338" y="340" width="28" height="10" rx="3" fill="#333" stroke="#555"/>
  <text x="352" y="349" fill="#555" text-anchor="middle" font-size="7">USB-C</text>

  <!-- Left pins (power) -->
  <text x="288" y="165" fill="#aaa"    font-size="8">5V</text>
  <line x1="280" y1="162" x2="260" y2="162" stroke="#ffaa00" stroke-width="1.5"/>
  <line x1="260" y1="162" x2="260" y2="118" stroke="#ffaa00" stroke-width="1.5"/>
  <line x1="260" y1="118" x2="280" y2="118" stroke="#ffaa00" stroke-width="1.5"/>

  <text x="288" y="185" fill="#aaa"    font-size="8">GND</text>
  <line x1="280" y1="182" x2="265" y2="182" stroke="#444"    stroke-width="1.5"/>
  <line x1="265" y1="182" x2="265" y2="680" stroke="#444"    stroke-width="1.5"/>

  <text x="288" y="205" fill="#666"    font-size="8">3V3</text>
  <text x="288" y="225" fill="#666"    font-size="8">TX</text>
  <text x="288" y="245" fill="#666"    font-size="8">RX</text>
  <text x="288" y="265" fill="#666"    font-size="8">SCL</text>
  <text x="288" y="285" fill="#666"    font-size="8">SDA</text>

  <!-- Right pins (signal) — D0 to D4 used, D5-D10 shown greyed -->
  <text x="417" y="165" fill="#ff6b6b" font-size="8" text-anchor="end">D0/GPIO1</text>
  <line x1="425" y1="162" x2="460" y2="162" stroke="#ff6b6b" stroke-width="1.5"/>

  <text x="417" y="185" fill="#6bff6b" font-size="8" text-anchor="end">D1/GPIO2</text>
  <line x1="425" y1="182" x2="460" y2="182" stroke="#6bff6b" stroke-width="1.5"/>

  <text x="417" y="205" fill="#6b9fff" font-size="8" text-anchor="end">D2/GPIO3</text>
  <line x1="425" y1="202" x2="460" y2="202" stroke="#6b9fff" stroke-width="1.5"/>

  <text x="417" y="225" fill="#aa66ff" font-size="8" text-anchor="end">D3/GPIO4</text>
  <line x1="425" y1="222" x2="700" y2="222" stroke="#aa66ff" stroke-width="1.5"/>

  <text x="417" y="245" fill="#ffcc44" font-size="8" text-anchor="end">D4/GPIO5</text>
  <line x1="425" y1="242" x2="700" y2="242" stroke="#ffcc44" stroke-width="1.5"/>

  <!-- Unused pins greyed out -->
  <text x="417" y="265" fill="#333" font-size="8" text-anchor="end">D5/GPIO6</text>
  <text x="417" y="285" fill="#333" font-size="8" text-anchor="end">D6/GPIO43 TX</text>
  <text x="417" y="305" fill="#333" font-size="8" text-anchor="end">D7/GPIO44 RX</text>
  <text x="417" y="325" fill="#333" font-size="8" text-anchor="end">D8/GPIO7</text>
  <text x="417" y="345" fill="#333" font-size="8" text-anchor="end">D9/GPIO8</text>
  <text x="417" y="362" fill="#333" font-size="8" text-anchor="end">D10/GPIO9</text>

  <!-- LEDC info box inside board -->
  <rect x="292" y="285" width="126" height="62" rx="3" fill="#0a1520" stroke="#1a3050"/>
  <text x="355" y="298" fill="#555" text-anchor="middle" font-size="7">LEDC PWM</text>
  <text x="355" y="310" fill="#ff6b6b" text-anchor="middle" font-size="7">CH0 · GPIO1 · Red</text>
  <text x="355" y="321" fill="#6bff6b" text-anchor="middle" font-size="7">CH1 · GPIO2 · Green</text>
  <text x="355" y="332" fill="#6b9fff" text-anchor="middle" font-size="7">CH2 · GPIO3 · Blue</text>
  <text x="355" y="343" fill="#888"   text-anchor="middle" font-size="7">1kHz · 8-bit · 0-255</text>

  <!-- ═══ MOSFET RED — Q1 ═══ -->
  <rect x="460" y="135" width="78" height="75" rx="4" fill="#2d1515" stroke="#ff6b6b" stroke-width="1.5"/>
  <text x="499" y="152" fill="#ff6b6b" text-anchor="middle" font-size="9" font-weight="bold">IRLZ44N</text>
  <text x="499" y="164" fill="#ff6b6b" text-anchor="middle" font-size="8">Q1 — RED</text>
  <text x="468" y="180" fill="#aaa"    font-size="7">G</text>
  <text x="468" y="193" fill="#aaa"    font-size="7">D</text>
  <text x="468" y="206" fill="#aaa"    font-size="7">S</text>
  <text x="490" y="196" fill="#888"    font-size="7">100Ω gate</text>
  <text x="490" y="206" fill="#888"    font-size="7">10K↓GND</text>
  <!-- Gate wire from D0 -->
  <line x1="460" y1="177" x2="425" y2="177" stroke="#ff6b6b" stroke-width="1.5"/>
  <line x1="425" y1="177" x2="425" y2="162" stroke="#ff6b6b" stroke-width="1.5"/>
  <!-- Drain to 12V -->
  <line x1="499" y1="135" x2="499" y2="80"  stroke="#ff4444" stroke-width="1.5"/>
  <!-- Source to GND -->
  <line x1="499" y1="210" x2="499" y2="680" stroke="#444"    stroke-width="1.5"/>
  <!-- Gate pull-down dashed -->
  <line x1="472" y1="177" x2="472" y2="680" stroke="#444" stroke-width="0.8" stroke-dasharray="3,3"/>

  <!-- ═══ MOSFET GREEN — Q2 ═══ -->
  <rect x="460" y="235" width="78" height="75" rx="4" fill="#152d15" stroke="#6bff6b" stroke-width="1.5"/>
  <text x="499" y="252" fill="#6bff6b" text-anchor="middle" font-size="9" font-weight="bold">IRLZ44N</text>
  <text x="499" y="264" fill="#6bff6b" text-anchor="middle" font-size="8">Q2 — GREEN</text>
  <text x="468" y="280" fill="#aaa"    font-size="7">G</text>
  <text x="468" y="293" fill="#aaa"    font-size="7">D</text>
  <text x="468" y="306" fill="#aaa"    font-size="7">S</text>
  <!-- Gate wire from D1 -->
  <line x1="460" y1="277" x2="444" y2="277" stroke="#6bff6b" stroke-width="1.5"/>
  <line x1="444" y1="277" x2="444" y2="182" stroke="#6bff6b" stroke-width="1.5"/>
  <line x1="444" y1="182" x2="425" y2="182" stroke="#6bff6b" stroke-width="1.5"/>
  <!-- Drain to 12V -->
  <line x1="505" y1="235" x2="505" y2="80"  stroke="#ff4444" stroke-width="1.5"/>
  <!-- Source to GND -->
  <line x1="505" y1="310" x2="505" y2="680" stroke="#444"    stroke-width="1.5"/>
  <!-- Gate pull-down dashed -->
  <line x1="472" y1="277" x2="472" y2="235" stroke="#444" stroke-width="0.8" stroke-dasharray="3,3"/>

  <!-- ═══ MOSFET BLUE — Q3 ═══ -->
  <rect x="460" y="335" width="78" height="75" rx="4" fill="#15152d" stroke="#6b9fff" stroke-width="1.5"/>
  <text x="499" y="352" fill="#6b9fff" text-anchor="middle" font-size="9" font-weight="bold">IRLZ44N</text>
  <text x="499" y="364" fill="#6b9fff" text-anchor="middle" font-size="8">Q3 — BLUE</text>
  <text x="468" y="380" fill="#aaa"    font-size="7">G</text>
  <text x="468" y="393" fill="#aaa"    font-size="7">D</text>
  <text x="468" y="406" fill="#aaa"    font-size="7">S</text>
  <!-- Gate wire from D2 -->
  <line x1="460" y1="377" x2="450" y2="377" stroke="#6b9fff" stroke-width="1.5"/>
  <line x1="450" y1="377" x2="450" y2="202" stroke="#6b9fff" stroke-width="1.5"/>
  <line x1="450" y1="202" x2="425" y2="202" stroke="#6b9fff" stroke-width="1.5"/>
  <!-- Drain to 12V -->
  <line x1="511" y1="335" x2="511" y2="80"  stroke="#ff4444" stroke-width="1.5"/>
  <!-- Source to GND -->
  <line x1="511" y1="410" x2="511" y2="680" stroke="#444"    stroke-width="1.5"/>
  <!-- Gate pull-down dashed -->
  <line x1="472" y1="377" x2="472" y2="335" stroke="#444" stroke-width="0.8" stroke-dasharray="3,3"/>

  <!-- ═══ RGB LED STRIP J2 ═══ -->
  <rect x="590" y="100" width="130" height="120" rx="6" fill="#2a1f00" stroke="#ffaa00" stroke-width="1.5"/>
  <text x="655" y="120" fill="#ffaa00" text-anchor="middle" font-weight="bold" font-size="10">5050 RGB</text>
  <text x="655" y="134" fill="#ffaa00" text-anchor="middle" font-size="10">LED STRIP</text>
  <text x="655" y="150" fill="#888"    text-anchor="middle" font-size="8">J2 — 4-pin screw term.</text>
  <text x="655" y="163" fill="#888"    text-anchor="middle" font-size="8">12V common anode</text>
  <!-- +12V to strip -->
  <line x1="590" y1="115" x2="570" y2="115" stroke="#ff4444" stroke-width="1.5"/>
  <line x1="570" y1="115" x2="570" y2="80"  stroke="#ff4444" stroke-width="1.5"/>
  <!-- R- back to Q1 drain -->
  <text x="598" y="183" fill="#ff6b6b" font-size="8">R–</text>
  <line x1="590" y1="179" x2="560" y2="179" stroke="#ff6b6b" stroke-width="1.5"/>
  <line x1="560" y1="179" x2="560" y2="193" stroke="#ff6b6b" stroke-width="1.5"/>
  <line x1="560" y1="193" x2="499" y2="193" stroke="#ff6b6b" stroke-width="1.5"/>
  <!-- G- back to Q2 drain -->
  <text x="598" y="198" fill="#6bff6b" font-size="8">G–</text>
  <line x1="590" y1="194" x2="563" y2="194" stroke="#6bff6b" stroke-width="1.5"/>
  <line x1="563" y1="194" x2="563" y2="293" stroke="#6bff6b" stroke-width="1.5"/>
  <line x1="563" y1="293" x2="505" y2="293" stroke="#6bff6b" stroke-width="1.5"/>
  <!-- B- back to Q3 drain -->
  <text x="598" y="213" fill="#6b9fff" font-size="8">B–</text>
  <line x1="590" y1="209" x2="566" y2="209" stroke="#6b9fff" stroke-width="1.5"/>
  <line x1="566" y1="209" x2="566" y2="393" stroke="#6b9fff" stroke-width="1.5"/>
  <line x1="566" y1="393" x2="511" y2="393" stroke="#6b9fff" stroke-width="1.5"/>

  <!-- ═══ STATUS LED ═══ -->
  <rect x="700" y="205" width="100" height="45" rx="4" fill="#1a0a2e" stroke="#aa66ff" stroke-width="1.5"/>
  <text x="750" y="222" fill="#aa66ff" text-anchor="middle" font-size="9" font-weight="bold">STATUS LED</text>
  <text x="750" y="235" fill="#666"    text-anchor="middle" font-size="8">D3/GPIO4</text>
  <text x="750" y="245" fill="#666"    text-anchor="middle" font-size="8">330Ω series</text>
  <!-- Wire from GPIO4 -->
  <line x1="700" y1="222" x2="670" y2="222" stroke="#aa66ff" stroke-width="1.5"/>
  <!-- Cathode to GND -->
  <line x1="800" y1="222" x2="830" y2="222" stroke="#444"    stroke-width="1.5"/>
  <line x1="830" y1="222" x2="830" y2="680" stroke="#444"    stroke-width="1.5"/>

  <!-- ═══ RESET BUTTON ═══ -->
  <rect x="700" y="225" width="100" height="45" rx="4" fill="#2a1a00" stroke="#ffcc44" stroke-width="1.5"/>
  <text x="750" y="242" fill="#ffcc44" text-anchor="middle" font-size="9" font-weight="bold">RESET BTN</text>
  <text x="750" y="255" fill="#666"    text-anchor="middle" font-size="8">D4/GPIO5</text>
  <text x="750" y="265" fill="#666"    text-anchor="middle" font-size="8">INPUT_PULLUP · Hold 5s</text>
  <!-- Wire from GPIO5 -->
  <line x1="700" y1="242" x2="670" y2="242" stroke="#ffcc44" stroke-width="1.5"/>
  <!-- Other side to GND -->
  <line x1="800" y1="242" x2="840" y2="242" stroke="#444"    stroke-width="1.5"/>
  <line x1="840" y1="242" x2="840" y2="680" stroke="#444"    stroke-width="1.5"/>

  <!-- ═══ DECOUPLING CAPS ═══ -->
  <rect x="280" y="390" width="130" height="55" rx="4" fill="#111" stroke="#444" stroke-width="1"/>
  <text x="345" y="406" fill="#666" text-anchor="middle" font-size="8" font-weight="bold">DECOUPLING CAPS</text>
  <text x="345" y="419" fill="#555" text-anchor="middle" font-size="7">C1: 100nF ceramic — 5V rail</text>
  <text x="345" y="430" fill="#555" text-anchor="middle" font-size="7">C2: 10µF electro — 5V rail</text>
  <text x="345" y="441" fill="#555" text-anchor="middle" font-size="7">C3: 100nF ceramic — 12V rail</text>

  <!-- ═══ BOOT PIN WARNING ═══ -->
  <rect x="460" y="435" width="270" height="52" rx="4" fill="#1a1200" stroke="#ffcc44" stroke-width="1"/>
  <text x="595" y="452" fill="#ffcc44" text-anchor="middle" font-size="9" font-weight="bold">⚠  XIAO ESP32-S3 Pin Notes</text>
  <text x="595" y="465" fill="#aaa"    text-anchor="middle" font-size="8">GPIO 19/20 = USB D+/D– · Do not use</text>
  <text x="595" y="477" fill="#aaa"    text-anchor="middle" font-size="8">GPIO 43/44 = TX/RX · Keep free for Serial</text>

  <!-- ═══ LEGEND ═══ -->
  <rect x="30" y="500" width="410" height="170" rx="6" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="235" y="518" fill="#ccc" text-anchor="middle" font-size="10" font-weight="bold">LEGEND</text>

  <line x1="45"  y1="532" x2="80"  y2="532" stroke="#ff4444" stroke-width="2"/>
  <text x="85"  y="536" fill="#ff4444" font-size="9">+12V Rail (LED strip + buck input)</text>

  <line x1="45"  y1="549" x2="80"  y2="549" stroke="#ffaa00" stroke-width="2"/>
  <text x="85"  y="553" fill="#ffaa00" font-size="9">+5V (Buck output → XIAO 5V pin)</text>

  <line x1="45"  y1="566" x2="80"  y2="566" stroke="#444"    stroke-width="2"/>
  <text x="85"  y="570" fill="#888"    font-size="9">GND (common ground)</text>

  <line x1="45"  y1="583" x2="80"  y2="583" stroke="#ff6b6b" stroke-width="1.5"/>
  <text x="85"  y="587" fill="#ff6b6b" font-size="9">Red PWM — D0/GPIO1 — LEDC CH0</text>

  <line x1="45"  y1="600" x2="80"  y2="600" stroke="#6bff6b" stroke-width="1.5"/>
  <text x="85"  y="604" fill="#6bff6b" font-size="9">Green PWM — D1/GPIO2 — LEDC CH1</text>

  <line x1="45"  y1="617" x2="80"  y2="617" stroke="#6b9fff" stroke-width="1.5"/>
  <text x="85"  y="621" fill="#6b9fff" font-size="9">Blue PWM — D2/GPIO3 — LEDC CH2</text>

  <line x1="45"  y1="634" x2="80"  y2="634" stroke="#aa66ff" stroke-width="1.5"/>
  <text x="85"  y="638" fill="#aa66ff" font-size="9">Status LED — D3/GPIO4 — 330Ω series</text>

  <line x1="45"  y1="651" x2="80"  y2="651" stroke="#ffcc44" stroke-width="1.5"/>
  <text x="85"  y="655" fill="#ffcc44" font-size="9">Reset Button — D4/GPIO5 — INPUT_PULLUP</text>

  <line x1="45"  y1="658" x2="80"  y2="658" stroke="#444" stroke-width="0.8" stroke-dasharray="3,3"/>
  <text x="85"  y="668" fill="#555"    font-size="9">Gate pull-down 10kΩ to GND (all 3 MOSFETs)</text>

</svg>