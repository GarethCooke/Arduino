<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>WhisperBridge Setup</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: sans-serif; background: #111; color: #eee; display: flex; flex-direction: column; align-items: center; padding: 2rem 1rem; min-height: 100vh; }
  h1 { font-size: 1.4rem; margin-bottom: 0.25rem; letter-spacing: 0.05em; }
  .sub { font-size: 0.8rem; color: #888; margin-bottom: 2rem; }
  .card { background: #1e1e1e; border-radius: 12px; padding: 1.5rem; width: 100%; max-width: 360px; }
  label { display: block; font-size: 0.8rem; color: #888; margin-bottom: 0.3rem; margin-top: 1rem; }
  label:first-of-type { margin-top: 0; }
  input {
    width: 100%; padding: 0.75rem 1rem; background: #2a2a2a; border: 1px solid #333;
    border-radius: 8px; color: #eee; font-size: 1rem; outline: none;
  }
  input:focus { border-color: #2979ff; }
  button {
    width: 100%; margin-top: 1.5rem; padding: 0.9rem;
    background: #2979ff; color: #fff; border: none; border-radius: 10px;
    font-size: 1rem; font-weight: 700; cursor: pointer; letter-spacing: 0.05em;
    transition: background 0.15s;
  }
  button:disabled { background: #333; color: #555; cursor: not-allowed; }
  button:not(:disabled):hover { background: #1565c0; }
  #msg { margin-top: 1rem; font-size: 0.85rem; color: #888; min-height: 1.2em; text-align: center; }
</style>
</head>
<body>
<h1>WhisperBridge</h1>
<p class="sub">WiFi Setup</p>

<div class="card">
  <label for="ssid">Network name (SSID)</label>
  <input id="ssid" type="text" placeholder="MyNetwork" autocomplete="off" autocorrect="off" autocapitalize="none" spellcheck="false">

  <label for="pass">Password</label>
  <input id="pass" type="password" placeholder="leave empty for open networks" autocomplete="off">

  <button id="btn" onclick="save()">Save &amp; Connect</button>
</div>
<div id="msg"></div>

<script>
async function save() {
  const ssid = document.getElementById('ssid').value.trim();
  if (!ssid) { document.getElementById('msg').textContent = 'SSID is required.'; return; }

  const btn = document.getElementById('btn');
  const msg = document.getElementById('msg');
  btn.disabled = true;
  msg.style.color = '#888';
  msg.textContent = 'Saving…';

  try {
    const res = await fetch('/api/networkset', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ ssid, password: document.getElementById('pass').value })
    });
    if (res.ok) {
      msg.style.color = '#4caf50';
      msg.textContent = 'Saved! Device is restarting — reconnect to your network.';
    } else {
      throw new Error('HTTP ' + res.status);
    }
  } catch (e) {
    msg.style.color = '#f44336';
    msg.textContent = 'Error: ' + e.message;
    btn.disabled = false;
  }
}

document.addEventListener('keydown', e => { if (e.key === 'Enter') save(); });
</script>
</body>
</html>
